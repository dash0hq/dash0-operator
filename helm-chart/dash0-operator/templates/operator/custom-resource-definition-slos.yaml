---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
    {{- if .Values.operator.certManager.useCertManager }}
    {{- with .Values.operator.certManager.certManagerAnnotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- end }}
  labels:
    dash0.com/managed-by-operator: "true"
  name: slos.openslo.com
spec:
  group: openslo.com
  names:
    kind: SLO
    listKind: SLOList
    plural: slos
    singular: slo
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: |-
          SLO is the Schema for the SLOs API. It adopts the upstream OpenSLO v1 document shape (apiVersion "openslo/v1",
          kind "SLO"). The spec is a typed subset of the OpenSLO v1 SLO specification: exactly the subset that the Dash0
          SLO API supports (a single objective, an inline ratioMetric indicator with good + total Prometheus sources,
          Occurrences budgeting, and a rolling time window). Its JSON shape mirrors the Dash0 API SloSpec field-for-field,
          so the controller can carry the spec across to the API body without any field-level conversion.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SLOSpec defines the desired state of an SLO. It models only the subset of the OpenSLO v1 SLO specification that
              the Dash0 SLO API supports. The JSON tags match the Dash0 API SloSpec exactly.
            properties:
              budgetingMethod:
                description: |-
                  BudgetingMethod is the error-budget accounting method. Only Occurrences (a ratio of good events to total
                  events) is supported by Dash0.
                enum:
                - Occurrences
                type: string
              description:
                description: Description is an optional human-readable description
                  of the SLO.
                maxLength: 1050
                type: string
              indicator:
                description: |-
                  Indicator is the inline service level indicator (SLI) for the SLO. Only an inline indicator with a ratioMetric
                  is supported; indicatorRef and thresholdMetric are not supported.
                properties:
                  metadata:
                    description: Metadata holds optional metadata for the inline SLI.
                    properties:
                      displayName:
                        description: DisplayName is a human-readable display name
                          for the SLI.
                        type: string
                      name:
                        description: Name is the name of the SLI.
                        type: string
                    type: object
                  spec:
                    description: Spec is the SLI specification.
                    properties:
                      ratioMetric:
                        description: RatioMetric is a ratio-based SLI metric with
                          a good and a total Prometheus source.
                        properties:
                          counter:
                            description: |-
                              Counter indicates whether the underlying metric is a monotonically increasing counter (true) or a gauge-like
                              value (false).
                            type: boolean
                          good:
                            description: Good is the metric source counting good (successful)
                              events.
                            properties:
                              metricSource:
                                description: MetricSource is the underlying metric
                                  source.
                                properties:
                                  spec:
                                    description: Spec holds the data-source-specific
                                      query parameters (for Prometheus, a PromQL query).
                                    properties:
                                      query:
                                        description: Query is the PromQL query used
                                          to compute the metric.
                                        minLength: 1
                                        type: string
                                    required:
                                    - query
                                    type: object
                                  type:
                                    description: Type is the metric source type. Only
                                      "Prometheus" is supported.
                                    enum:
                                    - Prometheus
                                    type: string
                                required:
                                - spec
                                - type
                                type: object
                            required:
                            - metricSource
                            type: object
                          total:
                            description: Total is the metric source counting all events.
                            properties:
                              metricSource:
                                description: MetricSource is the underlying metric
                                  source.
                                properties:
                                  spec:
                                    description: Spec holds the data-source-specific
                                      query parameters (for Prometheus, a PromQL query).
                                    properties:
                                      query:
                                        description: Query is the PromQL query used
                                          to compute the metric.
                                        minLength: 1
                                        type: string
                                    required:
                                    - query
                                    type: object
                                  type:
                                    description: Type is the metric source type. Only
                                      "Prometheus" is supported.
                                    enum:
                                    - Prometheus
                                    type: string
                                required:
                                - spec
                                - type
                                type: object
                            required:
                            - metricSource
                            type: object
                        required:
                        - good
                        - total
                        type: object
                    required:
                    - ratioMetric
                    type: object
                required:
                - spec
                type: object
              objectives:
                description: Objectives are the objective thresholds for the SLO.
                  Dash0 supports exactly one objective.
                items:
                  description: SLOObjective is an objective threshold for the SLO.
                  properties:
                    displayName:
                      description: DisplayName is a human-readable name for this objective.
                      type: string
                    target:
                      description: |-
                        Target is the budget target for this objective as a fraction in the range [0.0, 1.0) (for example, 0.99 for a
                        99 percent target).
                      exclusiveMaximum: true
                      maximum: 1
                      minimum: 0
                      type: number
                  required:
                  - target
                  type: object
                maxItems: 1
                minItems: 1
                type: array
              service:
                description: Service is the name of the service this SLO is associated
                  with.
                type: string
              timeWindow:
                description: |-
                  TimeWindow is the time window over which the SLO is evaluated. Exactly one item is supported, and it must be a
                  rolling window (for example, a rolling 28d window). Calendar-aligned windows are not supported.
                items:
                  description: SLOTimeWindow is a rolling time window over which the
                    SLO is evaluated.
                  properties:
                    duration:
                      description: Duration is the length of the rolling window as
                        an OpenSLO duration string (for example, "28d" or "4w").
                      pattern: ^\d+(ms|s|m|h|d|w|M|Q|y)$
                      type: string
                    isRolling:
                      description: |-
                        IsRolling indicates whether this is a rolling time window. Dash0 only supports rolling windows, so this must
                        be set to true.
                      enum:
                      - true
                      type: boolean
                  required:
                  - duration
                  - isRolling
                  type: object
                maxItems: 1
                minItems: 1
                type: array
            required:
            - budgetingMethod
            - indicator
            - objectives
            - timeWindow
            type: object
          status:
            description: |-
              SLOStatus defines the observed state of an SLO. It follows the same shape used by the operator's first-party synced
              CRDs (see Dash0SyntheticCheckStatus).
            properties:
              synchronizationResults:
                items:
                  description: SLOSynchronizationResultPerEndpointAndDataset defines
                    the synchronization result per endpoint and dataset.
                  properties:
                    dash0ApiEndpoint:
                      type: string
                    dash0Dataset:
                      type: string
                    dash0Id:
                      type: string
                    dash0Origin:
                      type: string
                    httpStatusCode:
                      description: |-
                        HttpStatusCode is the HTTP status code that the Dash0 API returned for the failed synchronization attempt, if the
                        failure was caused by an unexpected HTTP response. It is 0 (absent) for successful synchronizations and for
                        transport-level errors (network errors, timeouts) where no HTTP response was received. It is used to decide
                        whether a failed synchronization should be retried.
                      type: integer
                    synchronizationError:
                      type: string
                    synchronizationStatus:
                      description: |-
                        Dash0ApiResourceSynchronizationStatus describes the result of synchronizing a (non-third-party) Kubernetes resource
                        (e.g. synthetic checks) to the Dash0 API.
                      enum:
                      - successful
                      - partially-successful
                      - failed
                      type: string
                  required:
                  - synchronizationStatus
                  type: object
                type: array
              synchronizationStatus:
                description: |-
                  Dash0ApiResourceSynchronizationStatus describes the result of synchronizing a (non-third-party) Kubernetes resource
                  (e.g. synthetic checks) to the Dash0 API.
                enum:
                - successful
                - partially-successful
                - failed
                type: string
              synchronizedAt:
                format: date-time
                type: string
              validationIssues:
                items:
                  type: string
                type: array
            required:
            - synchronizationResults
            - synchronizationStatus
            - synchronizedAt
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
