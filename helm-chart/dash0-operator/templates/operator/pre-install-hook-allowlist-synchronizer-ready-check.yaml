{{- if (and .Values.operator.gke.autopilot.enabled .Values.operator.gke.autopilot.deployAllowlistSynchronizer) }}
{{/*
This job needs its own separate ClusterRole, ClusterRoleBinding and ServiceAccount because the main Helm chart's
resources have not been installed yet when pre-install/pre-upgrade hooks run.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ template "dash0-operator.preInstallHookServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": "before-hook-creation,hook-succeeded,hook-failed"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ template "dash0-operator.chartName" . }}-pre-install-role
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-9"
    "helm.sh/hook-delete-policy": "before-hook-creation,hook-succeeded,hook-failed"
rules:
  - apiGroups:
    - apiextensions.k8s.io
    resources:
    - customresourcedefinitions
    verbs:
    - get
  - apiGroups:
    - auto.gke.io
    resources:
    - allowlistsynchronizers
    verbs:
    - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "dash0-operator.chartName" . }}-pre-install-role-binding
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-8"
    "helm.sh/hook-delete-policy": "before-hook-creation,hook-succeeded,hook-failed"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "dash0-operator.chartName" . }}-pre-install-role
subjects:
  - kind: ServiceAccount
    name: {{ template "dash0-operator.preInstallHookServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "dash0-operator.chartName" . }}-allowlist-synchronizer-ready
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: dash0-operator
    app.kubernetes.io/component: allowlist-synchronizer-ready-check
    {{- include "dash0-operator.labels" . | nindent 4 }}
    dash0.com/enable: "false"
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": "hook-succeeded"
spec:
  template:
    metadata:
      name: {{ .Release.Name }}-pre-install-job-allowlist-synchronizer-ready-check
      labels:
        app.kubernetes.io/name: dash0-operator
        app.kubernetes.io/component: allowlist-synchronizer-ready-check
        app.kubernetes.io/instance: pre-install-hook
        app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
        helm.sh/chart: {{ include "dash0-operator.chartNameWithVersion" . }}
        cloud.google.com/matching-allowlist: dash0-pre-install-allowlist-synchronizer-ready-check-v1.0.3
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "dash0.com/enable"
                    operator: "NotIn"
                    values: ["false"]
                  - key: "kubernetes.io/os"
                    operator: "In"
                    values: ["linux"]
{{- if .Values.operator.tolerations }}
      tolerations:
        {{- toYaml .Values.operator.tolerations | nindent 8 }}
{{- end }}
{{- if .Values.operator.managerPriorityClassName }}
      priorityClassName: {{ .Values.operator.managerPriorityClassName }}
{{- end }}
      restartPolicy: OnFailure
      containers:
        - name: allowlist-synchronizer-ready-check-job
          image: {{ include "dash0-operator.image" . | quote }}
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          command:
            - /manager
          args:
            - "--allowlist-synchronizer-ready-check"
            - "--dash0-allow-list-version=v1.0.3"
          {{- /*
          Maintenance note: When adding new args or env entries, make sure they are covered by the Google GKE workload
          allowlist. In particular, adding args with the prefix "--dash0-" is always covered, as well as environment
          variables with any of the prefixes "DASH0_", "OTEL_", or "K8S_".
          */}}
          {{ include "dash0-operator.restrictiveContainerSecurityContext" dict | nindent 10 }}
          env:
            - name: GOMEMLIMIT
              value: {{ .Values.operator.managerContainerResources.gomemlimit }}
          resources:
            {{- unset (.Values.operator.managerContainerResources | mustDeepCopy) "gomemlimit" | toYaml | nindent 12 }}
      {{- with .Values.operator.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
      serviceAccountName: {{ template "dash0-operator.preInstallHookServiceAccountName" . }}
      automountServiceAccountToken: true
  backoffLimit: 2
{{- end }}
