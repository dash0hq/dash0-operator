---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: dash0notificationchannels.operator.dash0.com
spec:
  group: operator.dash0.com
  names:
    kind: Dash0NotificationChannel
    listKind: Dash0NotificationChannelList
    plural: dash0notificationchannels
    singular: dash0notificationchannel
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: Dash0NotificationChannel is the Schema for the Dash0NotificationChannel
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              Dash0NotificationChannelSpec defines the desired state of Dash0NotificationChannel.

              Exactly one of the type-specific config fields (slackConfig, slackBotConfig, emailV2Config, webhookConfig,
              incidentioConfig, opsgenieConfig, pagerdutyConfig, teamsWebhookConfig, discordWebhookConfig,
              googleChatWebhookConfig, ilertConfig, allQuietConfig) must be set, matching the value of the type field.
            properties:
              allQuietConfig:
                description: Configuration for All Quiet notifications. Required when
                  type is "all_quiet".
                properties:
                  url:
                    description: The All Quiet webhook URL.
                    format: uri
                    type: string
                required:
                - url
                type: object
              discordWebhookConfig:
                description: Configuration for Discord webhook notifications. Required
                  when type is "discord_webhook".
                properties:
                  url:
                    description: The Discord webhook URL.
                    format: uri
                    type: string
                required:
                - url
                type: object
              display:
                description: Display configuration for the notification channel.
                properties:
                  name:
                    description: The display name of the notification channel.
                    type: string
                required:
                - name
                type: object
              emailV2Config:
                description: Configuration for email (v2) notifications. Required
                  when type is "email_v2".
                properties:
                  plaintext:
                    description: Whether to send emails in plaintext format.
                    type: boolean
                  recipients:
                    description: The list of email recipients.
                    items:
                      type: string
                    minItems: 1
                    type: array
                required:
                - recipients
                type: object
              frequency:
                description: Specifies the notification frequency. Optional, defaults
                  to "10m".
                type: string
              googleChatWebhookConfig:
                description: Configuration for Google Chat webhook notifications.
                  Required when type is "google_chat_webhook".
                properties:
                  url:
                    description: The Google Chat webhook URL.
                    format: uri
                    type: string
                required:
                - url
                type: object
              ilertConfig:
                description: Configuration for iLert notifications. Required when
                  type is "ilert".
                properties:
                  url:
                    description: The iLert alert source URL.
                    format: uri
                    type: string
                required:
                - url
                type: object
              incidentioConfig:
                description: Configuration for Incident.io notifications. Required
                  when type is "incidentio".
                properties:
                  headers:
                    description: The authorization header value for Incident.io.
                    type: string
                  url:
                    description: The Incident.io webhook URL.
                    format: uri
                    type: string
                required:
                - headers
                - url
                type: object
              opsgenieConfig:
                description: Configuration for OpsGenie notifications. Required when
                  type is "opsgenie".
                properties:
                  apiKey:
                    description: The OpsGenie API key.
                    type: string
                  instance:
                    description: The OpsGenie instance region.
                    enum:
                    - eu
                    - us
                    type: string
                required:
                - apiKey
                - instance
                type: object
              pagerdutyConfig:
                description: Configuration for PagerDuty notifications. Required when
                  type is "pagerduty".
                properties:
                  key:
                    description: The PagerDuty integration key.
                    type: string
                  url:
                    description: The PagerDuty events API URL.
                    format: uri
                    type: string
                required:
                - key
                - url
                type: object
              routing:
                description: |-
                  Routing configuration for the notification channel. When set, routing updates will be executed. When omitted,
                  no routing changes will be made.
                properties:
                  assets:
                    description: The assets to route notifications for.
                    items:
                      description: Dash0NotificationChannelRoutingAsset defines a
                        routing asset.
                      properties:
                        dataset:
                          description: The dataset of the asset.
                          type: string
                        id:
                          description: The ID of the asset.
                          type: string
                        kind:
                          description: The kind of asset.
                          enum:
                          - check_rule
                          - synthetic_check
                          type: string
                        name:
                          description: The name of the asset.
                          type: string
                      required:
                      - dataset
                      - id
                      - kind
                      - name
                      type: object
                    type: array
                  filters:
                    description: Filter criteria for routing notifications.
                    items:
                      description: Dash0NotificationChannelRoutingFilter defines a
                        filter condition for notification routing.
                      properties:
                        key:
                          description: The attribute key to be filtered.
                          type: string
                        operator:
                          description: The match operation for filtering attributes.
                          enum:
                          - is
                          - is_not
                          - is_set
                          - is_not_set
                          - is_one_of
                          - is_not_one_of
                          - gt
                          - lt
                          - gte
                          - lte
                          - matches
                          - does_not_match
                          - contains
                          - does_not_contain
                          - starts_with
                          - does_not_start_with
                          - ends_with
                          - does_not_end_with
                          - is_any
                          type: string
                        value:
                          description: The value to match against.
                          type: string
                        values:
                          description: List of values to match against. This parameter
                            is mandatory for the is_one_of and is_not_one_of operators.
                          items:
                            type: string
                          type: array
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                required:
                - assets
                - filters
                type: object
              slackBotConfig:
                description: Configuration for Slack Bot notifications. Required when
                  type is "slack_bot".
                properties:
                  channel:
                    description: The Slack channel to post to.
                    type: string
                  teamId:
                    description: The Slack team (workspace) ID.
                    type: string
                required:
                - channel
                - teamId
                type: object
              slackConfig:
                description: Configuration for Slack webhook notifications. Required
                  when type is "slack".
                properties:
                  channel:
                    description: The Slack channel to post to.
                    type: string
                  webhookURL:
                    description: The Slack incoming webhook URL.
                    format: uri
                    type: string
                required:
                - channel
                - webhookURL
                type: object
              teamsWebhookConfig:
                description: Configuration for Microsoft Teams webhook notifications.
                  Required when type is "teams_webhook".
                properties:
                  url:
                    description: The Microsoft Teams incoming webhook URL.
                    format: uri
                    type: string
                required:
                - url
                type: object
              type:
                description: The type of notification channel integration.
                enum:
                - slack
                - slack_bot
                - email
                - email_v2
                - webhook
                - incidentio
                - prometheus_webhook
                - betterstack
                - prometheus_alertmanager
                - opsgenie
                - pagerduty
                - jira_service_management_ops
                - teams_webhook
                - discord_webhook
                - google_chat_webhook
                - ilert
                - all_quiet
                type: string
              webhookConfig:
                description: Configuration for generic webhook notifications. Required
                  when type is "webhook".
                properties:
                  allowInsecure:
                    default: false
                    description: Whether to allow insecure (non-TLS) connections.
                    type: boolean
                  followRedirects:
                    default: false
                    description: Whether to follow HTTP redirects.
                    type: boolean
                  headers:
                    additionalProperties:
                      type: string
                    description: Additional HTTP headers to include in the webhook
                      request.
                    type: object
                  url:
                    description: The webhook URL.
                    format: uri
                    type: string
                required:
                - url
                type: object
            required:
            - display
            - type
            type: object
            x-kubernetes-validations:
            - message: slackConfig must be set when type is 'slack', and must not
                be set otherwise
              rule: 'self.type == ''slack'' ? has(self.slackConfig) : !has(self.slackConfig)'
            - message: slackBotConfig must be set when type is 'slack_bot', and must
                not be set otherwise
              rule: 'self.type == ''slack_bot'' ? has(self.slackBotConfig) : !has(self.slackBotConfig)'
            - message: emailV2Config must be set when type is 'email_v2', and must
                not be set otherwise
              rule: 'self.type == ''email_v2'' ? has(self.emailV2Config) : !has(self.emailV2Config)'
            - message: webhookConfig must be set when type is 'webhook', and must
                not be set otherwise
              rule: 'self.type == ''webhook'' ? has(self.webhookConfig) : !has(self.webhookConfig)'
            - message: incidentioConfig must be set when type is 'incidentio', and
                must not be set otherwise
              rule: 'self.type == ''incidentio'' ? has(self.incidentioConfig) : !has(self.incidentioConfig)'
            - message: opsgenieConfig must be set when type is 'opsgenie', and must
                not be set otherwise
              rule: 'self.type == ''opsgenie'' ? has(self.opsgenieConfig) : !has(self.opsgenieConfig)'
            - message: pagerdutyConfig must be set when type is 'pagerduty', and must
                not be set otherwise
              rule: 'self.type == ''pagerduty'' ? has(self.pagerdutyConfig) : !has(self.pagerdutyConfig)'
            - message: teamsWebhookConfig must be set when type is 'teams_webhook',
                and must not be set otherwise
              rule: 'self.type == ''teams_webhook'' ? has(self.teamsWebhookConfig)
                : !has(self.teamsWebhookConfig)'
            - message: discordWebhookConfig must be set when type is 'discord_webhook',
                and must not be set otherwise
              rule: 'self.type == ''discord_webhook'' ? has(self.discordWebhookConfig)
                : !has(self.discordWebhookConfig)'
            - message: googleChatWebhookConfig must be set when type is 'google_chat_webhook',
                and must not be set otherwise
              rule: 'self.type == ''google_chat_webhook'' ? has(self.googleChatWebhookConfig)
                : !has(self.googleChatWebhookConfig)'
            - message: ilertConfig must be set when type is 'ilert', and must not
                be set otherwise
              rule: 'self.type == ''ilert'' ? has(self.ilertConfig) : !has(self.ilertConfig)'
            - message: allQuietConfig must be set when type is 'all_quiet', and must
                not be set otherwise
              rule: 'self.type == ''all_quiet'' ? has(self.allQuietConfig) : !has(self.allQuietConfig)'
          status:
            description: Dash0NotificationChannelStatus defines the observed state
              of Dash0NotificationChannel
            properties:
              synchronizationResults:
                items:
                  description: Dash0NotificationChannelSynchronizationResultPerEndpointAndDataset
                    defines the synchronization result per endpoint
                  properties:
                    dash0ApiEndpoint:
                      type: string
                    dash0Id:
                      type: string
                    dash0Origin:
                      type: string
                    synchronizationError:
                      type: string
                    synchronizationStatus:
                      description: |-
                        Dash0ApiResourceSynchronizationStatus describes the result of synchronizing a (non-third-party) Kubernetes resource
                        (e.g. synthetic checks) to the Dash0 API.
                      enum:
                      - successful
                      - partially-successful
                      - failed
                      type: string
                  required:
                  - synchronizationStatus
                  type: object
                type: array
              synchronizationStatus:
                description: |-
                  Dash0ApiResourceSynchronizationStatus describes the result of synchronizing a (non-third-party) Kubernetes resource
                  (e.g. synthetic checks) to the Dash0 API.
                enum:
                - successful
                - partially-successful
                - failed
                type: string
              synchronizedAt:
                format: date-time
                type: string
              validationIssues:
                items:
                  type: string
                type: array
            required:
            - synchronizationResults
            - synchronizationStatus
            - synchronizedAt
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
