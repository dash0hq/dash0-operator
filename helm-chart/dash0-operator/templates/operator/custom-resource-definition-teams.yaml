---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: dash0teams.dash0.com
spec:
  group: dash0.com
  names:
    kind: Dash0Team
    listKind: Dash0TeamList
    plural: dash0teams
    singular: dash0team
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Dash0Team is the Schema for the Dash0Team API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Dash0TeamSpec defines the desired state of Dash0Team.
            properties:
              display:
                description: |-
                  Display configuration for the team. Carries the human-facing name shown in the Dash0 UI, an optional
                  description, and the color gradient used for the team's badge.
                properties:
                  color:
                    description: The color gradient used for the team's badge in the
                      Dash0 UI.
                    properties:
                      from:
                        description: The start color of the gradient.
                        minLength: 1
                        type: string
                      to:
                        description: The end color of the gradient.
                        minLength: 1
                        type: string
                    required:
                    - from
                    - to
                    type: object
                  description:
                    description: An optional long-form description of the team, shown
                      alongside the display name in the Dash0 UI.
                    type: string
                  name:
                    description: |-
                      The human-facing name of the team, as shown in the Dash0 UI. Distinct from the CR's metadata.name,
                      which is the technical name used by Kubernetes.
                    minLength: 1
                    type: string
                required:
                - color
                - name
                type: object
              members:
                description: |-
                  The declarative membership of the team. Each entry is either an internal member ID (the dash0.com/id
                  label value, e.g. "user_01ABC...") or an email address. Emails are matched case-insensitively against
                  the organization's members and translated to internal IDs on the server side during reconciliation.
                  Unresolvable emails cause the synchronization to fail with the offending emails reported on
                  status.synchronizationResults[].synchronizationError.

                  An empty list means "no members"; omitting the field is not allowed.
                items:
                  minLength: 1
                  type: string
                type: array
            required:
            - display
            - members
            type: object
          status:
            description: Dash0TeamStatus defines the observed state of Dash0Team
            properties:
              synchronizationResults:
                items:
                  description: |-
                    Dash0TeamSynchronizationResultPerEndpointAndDataset defines the synchronization result per endpoint. Teams
                    are organization-scoped and therefore do not carry a dataset segment; the type name mirrors the sibling
                    notification channel status shape for consistency.
                  properties:
                    dash0ApiEndpoint:
                      type: string
                    dash0Id:
                      type: string
                    dash0Origin:
                      type: string
                    httpStatusCode:
                      description: |-
                        HttpStatusCode is the HTTP status code that the Dash0 API returned for the failed synchronization attempt, if the
                        failure was caused by an unexpected HTTP response. It is 0 (absent) for successful synchronizations and for
                        transport-level errors (network errors, timeouts) where no HTTP response was received. It is used to decide
                        whether a failed synchronization should be retried.
                      type: integer
                    synchronizationError:
                      type: string
                    synchronizationStatus:
                      description: |-
                        Dash0ApiResourceSynchronizationStatus describes the result of synchronizing a (non-third-party) Kubernetes resource
                        (e.g. synthetic checks) to the Dash0 API.
                      enum:
                      - successful
                      - partially-successful
                      - failed
                      type: string
                  required:
                  - synchronizationStatus
                  type: object
                type: array
              synchronizationStatus:
                description: |-
                  Dash0ApiResourceSynchronizationStatus describes the result of synchronizing a (non-third-party) Kubernetes resource
                  (e.g. synthetic checks) to the Dash0 API.
                enum:
                - successful
                - partially-successful
                - failed
                type: string
              synchronizedAt:
                format: date-time
                type: string
              validationIssues:
                items:
                  type: string
                type: array
            required:
            - synchronizationResults
            - synchronizationStatus
            - synchronizedAt
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
