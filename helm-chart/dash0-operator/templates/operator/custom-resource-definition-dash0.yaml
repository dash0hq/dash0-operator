                  - type
                  type: object
                type: array
              previousInstrumentWorkloads:
                description: The spec.instrumentWorkloads setting that has been observed
                  in the previous reconcile cycle.
                enum:
                - all
                - created-and-updated
                - none
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
