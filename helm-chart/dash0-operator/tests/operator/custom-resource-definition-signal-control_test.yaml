suite: test Signal Control CRD
templates:
  - operator/custom-resource-definition-signal-control.yaml
tests:
  - it: should not render the Signal Control CRD by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render the Signal Control CRD when Signal Control is enabled
    set:
      operator:
        signalControl:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: CustomResourceDefinition
      - equal:
          path: metadata.name
          value: dash0signalcontrols.operator.dash0.com
