suite: test allowlist synchronizer remove hook
templates:
  - operator/post-delete-remove-allowlist-synchronizer.yaml
tests:
  - it: should not install the GKE Autopilot AllowlistSynchronizer remove job if operator.gke.autopilot.enabled is false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not install the GKE Autopilot AllowlistSynchronizer remove job if operator.gke.autopilot.enabled is true but operator.gke.autopilot.deployAllowlistSynchronizer is false
    set:
      operator:
        gke:
          autopilot:
            enabled: true
            deployAllowlistSynchronizer: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should install the GKE Autopilot AllowlistSynchronizer remove job if operator.gke.autopilot.enabled is true
    set:
      operator:
        gke:
          autopilot:
            enabled: true
    asserts:
      - hasDocuments:
          count: 4
      - matchSnapshot: {}
