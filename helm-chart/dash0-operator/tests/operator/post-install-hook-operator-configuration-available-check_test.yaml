suite: test post-install hook job
templates:
  - operator/post-install-hook-operator-configuration-available-check.yaml
tests:
  - it: post-install hook job should match snapshot
    set:
      operator:
        dash0Export:
          enabled: true
          endpoint: https://ingress.dash0.com
          token: "very-secret-dash0-auth-token"
          apiEndpoint: https://api.dash0.com
    asserts:
      - matchSnapshot: {}

  - it: hook should wait for the operator configuration resource if an auto resource is requested
    set:
      operator:
        dash0Export:
          enabled: true
          endpoint: https://ingress.dash0.com
          token: "very-secret-dash0-auth-token"
          apiEndpoint: https://api.dash0.com
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - "--auto-operator-configuration-resource-available-check"
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: post-install,post-upgrade
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation,hook-succeeded

  - it: image tag should default to appVersion
    chart:
      version: 4.5.6
      appVersion: 99.100.101
    set:
      operator:
        dash0Export:
          enabled: true
          endpoint: https://ingress.dash0.com
          token: "very-secret-dash0-auth-token"
          apiEndpoint: https://api.dash0.com
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/dash0hq/operator-controller:99.100.101

  - it: the post-install hook should wait for the webhook endpoint to become ready if no operator configuration auto resource is requested
    set:
      operator:
        dash0Export:
          enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - "--dash0-webhook-endpoint-ready-check"
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: post-install,post-upgrade
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DASH0_WEBHOOK_SERVICE_NAME
            value: dash0-operator-webhook-service

  - it: should render tolerations and priority class
    set:
      operator:
        dash0Export:
          enabled: true
          endpoint: https://ingress.dash0.com
          token: "very-secret-dash0-auth-token"
          apiEndpoint: https://api.dash0.com
        tolerations:
          - key: key1
            operator: Equal
            value: value1
            effect: NoSchedule
          - key: key2
            operator: Exists
            effect: NoSchedule
        managerPriorityClassName: operator-manager-priority-class
    asserts:
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: key1
              operator: Equal
              value: value1
              effect: NoSchedule
            - key: key2
              operator: Exists
              effect: NoSchedule
      - equal:
          path: spec.template.spec.priorityClassName
          value: operator-manager-priority-class

  - it: should consider the provided imagePullSecrets
    set:
      operator:
        dash0Export:
          enabled: true
          endpoint: https://ingress.dash0.com
          token: "very-secret-dash0-auth-token"
          apiEndpoint: https://api.dash0.com
        imagePullSecrets:
          - name: secret-for-private-reg
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: secret-for-private-reg
