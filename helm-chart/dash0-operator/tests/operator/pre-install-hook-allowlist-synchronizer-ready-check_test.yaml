suite: test allowlist synchronizer
templates:
  - operator/pre-install-hook-allowlist-synchronizer-ready-check.yaml
tests:
  - it: should not install the GKE Autopilot AllowlistSynchronizer ready check if operator.gke.autopilot.enabled is false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not install the GKE Autopilot AllowlistSynchronizer ready check if operator.gke.autopilot.enabled is true but operator.gke.autopilot.deployAllowlistSynchronizer is false
    set:
      operator:
        gke:
          autopilot:
            enabled: true
            deployAllowlistSynchronizer: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should install the GKE Autopilot AllowlistSynchronizer ready check if operator.gke.autopilot.enabled is true
    set:
      operator:
        gke:
          autopilot:
            enabled: true
    asserts:
      - hasDocuments:
          count: 4
      - matchSnapshot: {}
