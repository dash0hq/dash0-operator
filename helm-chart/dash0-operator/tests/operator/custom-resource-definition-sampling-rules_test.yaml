suite: test sampling rules CRD
templates:
  - operator/custom-resource-definition-sampling-rules.yaml
tests:
  - it: should not render the sampling rules CRD by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render the sampling rules CRD when IE is enabled
    set:
      operator:
        development:
          intelligentEdge:
            enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: CustomResourceDefinition
      - equal:
          path: metadata.name
          value: dash0samplingrules.operator.dash0.com
