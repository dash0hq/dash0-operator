suite: test cluster role bindings
templates:
  - operator/cluster-role-bindings.yaml
tests:
  - it: cluster role bindings should match snapshot
    asserts:
      - matchSnapshot: {}

  - it: should bind permissions for telemetry collection if telemetry collection is enabled
    asserts:
    - hasDocuments:
        count: 4
    - containsDocument:
        kind: ClusterRoleBinding
        apiVersion: rbac.authorization.k8s.io/v1
        name: dash0-operator-manager-base
      documentIndex: 0
    - containsDocument:
        kind: ClusterRoleBinding
        apiVersion: rbac.authorization.k8s.io/v1
        name: dash0-operator-manager-iac
      documentIndex: 1
    - containsDocument:
        kind: ClusterRoleBinding
        apiVersion: rbac.authorization.k8s.io/v1
        name: dash0-operator-manager-collector
      documentIndex: 2
    - containsDocument:
        kind: ClusterRoleBinding
        apiVersion: rbac.authorization.k8s.io/v1
        name: dash0-operator-manager-instrument
      documentIndex: 3

  - it: should not bind permissions for telemetry collection if telemetry collection is disabled
    set:
      operator:
        telemetryCollectionEnabled: false
    asserts:
    - hasDocuments:
        count: 2
    - containsDocument:
        kind: ClusterRoleBinding
        apiVersion: rbac.authorization.k8s.io/v1
        name: dash0-operator-manager-base
      documentIndex: 0
    - containsDocument:
        kind: ClusterRoleBinding
        apiVersion: rbac.authorization.k8s.io/v1
        name: dash0-operator-manager-iac
      documentIndex: 1

  - it: should not bind agent0-connector permissions by default
    asserts:
      - containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: dash0-operator-manager-agent0-connector-ro
        not: true
      - containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: dash0-operator-manager-agent0-connector
        not: true

  - it: should bind agent0-connector permissions if Agent0 connector is enabled
    set:
      operator:
        agent0Connector:
          enabled: true
    asserts:
      - containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: dash0-operator-manager-agent0-connector-ro
        documentIndex: 4
      - containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: dash0-operator-manager-agent0-connector
        documentIndex: 5

  - it: should bind agent0-connector management permissions independently of telemetry collection
    set:
      operator:
        telemetryCollectionEnabled: false
        agent0Connector:
          enabled: true
    asserts:
      - hasDocuments:
          count: 4
      - containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: dash0-operator-manager-collector
        not: true
      - containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: dash0-operator-manager-agent0-connector-ro
        documentIndex: 2
      - containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: dash0-operator-manager-agent0-connector
        documentIndex: 3
