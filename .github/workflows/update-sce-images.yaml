name: Check for Signal Control and Edge Proxy Image Updates

on:
  schedule:
    - cron: "45 08 * * MON-FRI"

  workflow_dispatch:

jobs:
  check-and-update:
    name: check for new Signal Control collector and Edge Proxy image tags and update the Helm chart values
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: check if open PR already exists
        id: open_pr_exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/workflows/scripts/update-sce-images-check-if-pr-exists.sh

      - name: update image tags and create PR
        if: steps.open_pr_exists.outputs.pr_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: .github/workflows/scripts/update-sce-images-create-pr.sh
