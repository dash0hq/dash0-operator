name: E2E tests on kind

on:
  workflow_call:
    secrets:
      SLACK_BOT_TOKEN:
        required: true
      SLACK_CHANNEL_ID:
        required: true
  workflow_dispatch:
    inputs:
      focus:
        required: false
        description: Execute a subset of tests by providing the focus parameter.
      pr_number:
        required: false
        description: PR number to report results back to (set automatically when triggered via PR comment).
      ie_image_tag:
        required: false
        description: Tag of ghcr.io/dash0hq/intelligent-edge-collector and ghcr.io/dash0hq/barker to pull. If empty, the highest vX.Y.Z tag published to ghcr is resolved at runtime.

env:
  DASH0_KIND_CLUSTER: dash0-operator-ci
  DASH0_KIND_CONFIG: /tmp/kind-config.yaml
  LOCAL_REGISTRY_VOLUME_PATH: /tmp/kind-registry
  LOCAL_REGISTRY_NAME: kind-registry
  LOCAL_REGISTRY_PORT: "5001"
  ALLOWED_KUBECTXS: kind-dash0-operator-ci
  E2E_KUBECTX: kind-dash0-operator-ci
  IMAGE_REPOSITORY_PREFIX: "localhost:5001/"

jobs:
  run-e2e-tests-on-kind:
    name: Set up cluster and run e2e tests
    runs-on: depot-ubuntu-24.04-4
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Log in to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve IE image tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_IE_TAG: ${{ inputs.ie_image_tag }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_IE_TAG:-}" ]]; then
            tag="$INPUT_IE_TAG"
            echo "Using ie_image_tag from workflow input: $tag"
          else
            resolve() {
              gh api --paginate "/orgs/dash0hq/packages/container/$1/versions" \
                --jq '.[].metadata.container.tags[]' \
                | { grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true; } \
                | sort -V | tail -1
            }
            iec=$(resolve intelligent-edge-collector)
            barker=$(resolve barker)
            if [[ -z "$iec" || -z "$barker" ]]; then
              echo "Failed to resolve highest vX.Y.Z tag (intelligent-edge-collector='$iec', barker='$barker')" >&2
              exit 1
            fi
            if [[ "$iec" != "$barker" ]]; then
              echo "intelligent-edge-collector ($iec) and barker ($barker) have different highest tags; aborting (they are expected to move in lockstep)." >&2
              exit 1
            fi
            tag="$iec"
            echo "Resolved highest IE image tag: $tag"
          fi
          echo "IE_IMAGE_TAG=$tag" >> "$GITHUB_ENV"

      - name: go version
        run: |
          go version

      - name: kind version
        run: |
          kind version

      - name: kubectl version
        run: |
          kubectl version --client

      - name: Create volume directories and kind config
        run: |
          # Create directories in /tmp for the kind cluster volumes
          mkdir -p /tmp/filelog-offsets
          mkdir -p /tmp/offset-storage
          mkdir -p /tmp/kind-registry

          # Create a temporary kind config with /tmp paths
          cat > /tmp/kind-config.yaml << 'EOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
              extraMounts:
                - hostPath: /tmp/filelog-offsets
                  containerPath: /offset-storage
            - role: worker
              extraPortMappings:
                - containerPort: 80
                  hostPort: 8080
                  protocol: TCP
                - containerPort: 443
                  hostPort: 4443
                  protocol: TCP
              labels:
                nginx-ingress: "true"
              extraMounts:
                - hostPath: /tmp/offset-storage
                  containerPath: /offset-storage
            - role: worker
              extraMounts:
                - hostPath: /tmp/offset-storage
                  containerPath: /offset-storage
          EOF

      - name: Create kind cluster and registry
        run: |
          ./test-resources/bin/create_cluster_and_registry.sh

      - name: Verify cluster is running
        run: |
          echo "Cluster nodes:"
          kubectl get nodes
          echo ""
          echo "Cluster info:"
          kubectl cluster-info
          echo ""
          echo "All pods:"
          kubectl get pods -A

      - name: Verify registry is running
        run: |
          echo "Checking registry container..."
          docker ps --filter name=kind-registry
          echo ""
          echo "Testing registry connectivity..."
          curl -s http://localhost:5001/v2/_catalog || echo "Registry catalog endpoint responded"

      - name: Pull private IE images and load into kind
        run: |
          images=(
            "ghcr.io/dash0hq/intelligent-edge-collector:${IE_IMAGE_TAG}"
            "ghcr.io/dash0hq/barker:${IE_IMAGE_TAG}"
          )
          for img in "${images[@]}"; do
            docker pull "$img"
            kind load docker-image "$img" --name "$DASH0_KIND_CLUSTER"
          done

      - name: Run e2e tests
        env:
          GINKGO_FOCUS: ${{ inputs.focus }}
          INTELLIGENT_EDGE_COLLECTOR_IMAGE_REPOSITORY: ghcr.io/dash0hq/intelligent-edge-collector
          INTELLIGENT_EDGE_COLLECTOR_IMAGE_TAG: ${{ env.IE_IMAGE_TAG }}
          INTELLIGENT_EDGE_COLLECTOR_IMAGE_PULL_POLICY: Never
          BARKER_IMAGE_REPOSITORY: ghcr.io/dash0hq/barker
          BARKER_IMAGE_TAG: ${{ env.IE_IMAGE_TAG }}
          BARKER_IMAGE_PULL_POLICY: Never
        run: |
          make build-all-push-all-test-e2e

      - name: Send Slack notification on success
        if: success()
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c
        with:
          errors: true
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          # language=YAML
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: 'Dash0 Operator E2E tests successful'
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: ':white_check_mark: Dash0 Operator E2E tests successful'
              - type: context
                elements:
                  - type: mrkdwn
                    text: ':github: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Workflow run #${{ github.run_id }}>'
                  - type: mrkdwn
                    text: ':seedling: <${{ github.server_url }}/${{ github.repository }}/tree/${{ github.head_ref || github.ref_name }}|${{ github.head_ref || github.ref_name }}>'
                  - type: mrkdwn
                    text: ':diff: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|Commit>'
                  - type: mrkdwn
                    text: ":mag: ${{ inputs.focus != '' && inputs.focus || 'full test suite' }}"

      - name: Upload Kubernetes cluster information and pod logs for failed tests
        id: upload-k8s-logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: e2e-cluster-info-and-logs
          path: test-resources/e2e/logs
          if-no-files-found: ignore

      - name: Send Slack notification on failure
        if: failure()
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c
        with:
          errors: true
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          # language=YAML
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: 'Dash0 Operator E2E tests failed'
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: ':x: Dash0 Operator E2E tests failed'
              - type: context
                elements:
                  - type: mrkdwn
                    text: ':github: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Workflow run #${{ github.run_id }}>'
                  - type: mrkdwn
                    text: ':seedling: <${{ github.server_url }}/${{ github.repository }}/tree/${{ github.head_ref || github.ref_name }}|${{ github.head_ref || github.ref_name }}>'
                  - type: mrkdwn
                    text: ':diff: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|Commit>'
                  - type: mrkdwn
                    text: ':scroll: <${{ steps.upload-k8s-logs.outputs.artifact-url }}|K8s cluster info/pod logs>'
                  - type: mrkdwn
                    text: ":mag: ${{ inputs.focus != '' && inputs.focus || 'full test suite' }}"

      - name: Post PR comment on success
        if: success() && inputs.pr_number != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          FOCUS: ${{ inputs.focus }}
        with:
          script: |
            const focusLine = process.env.FOCUS ? `\n- **Focus**: \`${process.env.FOCUS}\`` : '';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: [
                '### :white_check_mark: E2E tests passed',
                '',
                `- **Branch**: \`${process.env.GITHUB_REF_NAME}\`${focusLine}`,
                `- **Run**: [#${process.env.GITHUB_RUN_ID}](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`,
              ].join('\n'),
            });

      - name: Post PR comment on failure
        if: failure() && inputs.pr_number != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          FOCUS: ${{ inputs.focus }}
        with:
          script: |
            const focusLine = process.env.FOCUS ? `\n- **Focus**: \`${process.env.FOCUS}\`` : '';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: [
                '### :x: E2E tests failed',
                '',
                `- **Branch**: \`${process.env.GITHUB_REF_NAME}\`${focusLine}`,
                `- **Run**: [#${process.env.GITHUB_RUN_ID}](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`,
              ].join('\n'),
            });
