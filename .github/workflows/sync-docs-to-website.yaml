name: Synchronize Helm chart docs to dash0.com/docs

# Copies the docs from helm-chart/dash0-operator into the documentation on https://www.dash0.com/docs, applying the
# modifications declared in sync-docs/transformations.yaml, and opens a pull request against the target repository.
#
# The transformation logic and the PR flow live in the shared dash0hq/sync-docs-action composite action; this workflow
# only supplies the operator-specific inputs (source root, transformations file, PR metadata) and the token.
#
# The documentation is a set of files: the top-level README.md (which becomes the operator overview page
# dash0-operator/overview.md) and the topic files in helm-chart/dash0-operator/docs/*.md (which keep their names but
# move into the same dash0-operator/ subdirectory, i.e. the docs/ directory is renamed to dash0-operator/). They are
# transformed and written into the target directory. The section landing page about-kubernetes.md is hand-maintained
# in the target repository and is not touched by this sync.
#
# This workflow can be run manually (workflow_dispatch) and is also invoked from ci.yaml (workflow_call) after a new
# release has been published. Additionally, ci.yaml invokes it with dry-run: true on every CI build, to verify early
# that the transformations declared in sync-docs/transformations.yaml still apply cleanly (including the coverage
# check). In dry-run mode the action stops after the transformation step: no target repository is checked out, no PR
# is created, and no token is required.
#
# The target repository and the directory within it that receives the pages are supplied from the repository secrets
# SYNC_DOCUMENTATION_TARGET_REPOSITORY and SYNC_DOCUMENTATION_TARGET_DIRECTORY, so the (non-public) target repository
# name and its internal layout are not hardcoded in this workflow. Authentication to the target repository is done via
# the DASH0_DOCS_REPO_GITHUB_PAT secret: a fine-grained personal access token scoped to the target repository with
# Contents: Read and write (to push the branch) and Pull requests: Read and write (to open the PR).

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Only verify that the doc transformations still apply cleanly, do not create a pull request in the target repository.
        type: boolean
        default: false
  workflow_call:
    inputs:
      dry-run:
        description: Only verify that the doc transformations still apply cleanly, do not create a pull request in the target repository.
        type: boolean
        default: false
    secrets:
      DASH0_DOCS_REPO_GITHUB_PAT:
        description: Fine-grained PAT with contents + pull-requests write access for the documentation repository. Only required when dry-run is false.
        required: false
      SYNC_DOCUMENTATION_TARGET_REPOSITORY:
        description: owner/name of the target documentation repository. Only required when dry-run is false.
        required: false
      SYNC_DOCUMENTATION_TARGET_DIRECTORY:
        description: Directory within the target repository that receives the transformed pages. Only required when dry-run is false.
        required: false

jobs:
  sync-docs:
    name: Synchronize Helm chart docs with dash0.com/docs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout dash0-operator
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      # Single invocation for both modes. On a dry run the action applies the transformations and the coverage check,
      # then stops before touching the target repository; the target-side inputs are ignored, so they can be supplied
      # unconditionally. The operator's pages live under dash0-operator/ within the target directory; each
      # transformations.yaml `target:` (dash0-operator/<page>.md) is resolved relative to target-directory.
      - name: synchronize docs to the website
        uses: dash0hq/sync-docs-action@v0.4.0
        with:
          dry-run: ${{ inputs.dry-run }}
          source-root: helm-chart/dash0-operator
          # transformations-file is resolved relative to source-root, but this repo keeps the file at the repo-root
          # .github/ (not under helm-chart/dash0-operator/.github/), so step back up to the repository root.
          transformations-file: ../../.github/workflows/sync-docs/transformations.yaml
          target-repository: ${{ secrets.SYNC_DOCUMENTATION_TARGET_REPOSITORY }}
          target-directory: ${{ secrets.SYNC_DOCUMENTATION_TARGET_DIRECTORY }}
          target-github-token: ${{ secrets.DASH0_DOCS_REPO_GITHUB_PAT }}
          pr-branch: sync-dash0-operator-helm-chart-docs
          pr-title: "docs: synchronize Dash0 operator documentation"
          pr-body: >-
            This PR synchronizes the content of the Dash0 operator documentation from
            [dash0hq/dash0-operator](https://github.com/dash0hq/dash0-operator) into the documentation on
            https://www.dash0.com/docs.
          commit-message: "docs: synchronize Dash0 operator docs"
          pr-reviewers: dash0hq/operator,dash0hq/engineering-docs
