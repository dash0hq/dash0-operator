version: 2
updates:

  # Maintenance note: every update block below sets its own commit-message.prefix explicitly, new blocks should do the
  # same. When a block leaves the prefix unset, Dependabot infers a commit message prefix, and this is not always
  # reliable.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "ci(deps)"

  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/images/agent0-connector/src"
      - "/images/configreloader/src"
      - "/images/filelogoffsetsync/src"
      - "/images/pkg/common"
      - "test/e2e"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:05"
      timezone: "Europe/Berlin"
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
    commit-message:
      prefix: "chore(deps)"

  # Dash0 OpenTelemetry Distro for Node.js
  - package-ecosystem: "npm"
    directory: "images/instrumentation/node.js/"
    schedule:
      interval: "daily"
      time: "07:10"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(deps)"

  # OpenTelemetry Java agent
  - package-ecosystem: "maven"
    directory: "images/instrumentation/jvm/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore(deps)"

  # OpenTelemetry Distro for Python
  - package-ecosystem: "pip"
    directory: "images/instrumentation/python/"
    schedule:
      interval: "daily"
      time: "09:15"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(deps)"
    # The OpenTelemetry Python packages are pinned in lockstep (the 0.x beta instrumentation packages together with
    # the matching 1.x stable exporter). Group them into a single pull request so they are always updated together;
    # updating them individually would break the lockstep and likely fail pip's dependency resolution.
    groups:
      all:
        patterns:
          - "*"

  # Docker
  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/images/agent0-connector"
      - "/images/collector"
      - "/images/configreloader"
      - "/images/filelogoffsetsync"
      - "/images/filelogoffsetvolumeownership"
      - "/images/volumeownership"
      - "/images/instrumentation"
      - "/images/target-allocator"
    schedule:
      interval: "daily"
      time: "07:15"
      timezone: "Europe/Berlin"
    groups:
      production-dependencies:
        dependency-type: "production"
    commit-message:
      prefix: "chore(deps)"
    # The following 'ignore' rules are workarounds to prevent noisy/repeated dependabot PRs
    # that update dependencies to pre-release versions.
    # The rules need to be manually disabled when a new stable minor version is available.
    ignore:
      # enable the following `ignore` to prevent upgrades to golang pre-releases
      - dependency-name: "golang"
        update-types: ["version-update:semver-minor"]
      # enable the following `ignore` to prevent upgrades to python pre-releases
      - dependency-name: "python"
        update-types: ["version-update:semver-minor"]

  # -----------------------
  # -- Test applications --
  # -----------------------

  - package-ecosystem: "docker"
    directories:
      - "/test/e2e/otlp-sink/telemetrymatcher"
      - "/test/e2e/dash0-api-mock"
      - "/test/e2e/control-plane-mock"
      - "/test/e2e/decision-maker-mock"
      - "/test/e2e/outbound-connector-mock"
    schedule:
      interval: "daily"
      time: "07:18"
      timezone: "Europe/Berlin"
    groups:
      development-dependencies:
        dependency-type: "development"
    commit-message:
      prefix: "test"
    ignore:
      - dependency-name: "golang"
        update-types: ["version-update:semver-minor"]

  - package-ecosystem: "helm"
    directories:
      - "/test/e2e/otlp-sink/helm-chart"
      - "/test-resources/ebpf-profiler/helm-chart"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/Berlin"
    groups:
      development-dependencies:
        dependency-type: "development"
    commit-message:
      prefix: "test"

  - package-ecosystem: "gomod"
    directories:
      - "test/e2e/dash0-api-mock"
      - "test/e2e/control-plane-mock"
      - "test/e2e/decision-maker-mock"
      - "test/e2e/outbound-connector-mock"
      - "test/e2e/otlp-sink/telemetrymatcher"
      - "test/e2e/pkg/shared"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:15"
      timezone: "Europe/Berlin"
    groups:
      all:
        patterns:
          - "*"
    commit-message:
      prefix: "test"
    # enable the following `ignore` to prevent upgrades to RCs
    ignore:
      - dependency-name: "golang"
        update-types: ["version-update:semver-minor"]

  - package-ecosystem: "maven"
    directory: "test-resources/jvm/spring-boot"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:25"
      timezone: "Europe/Berlin"
    groups:
      all:
        patterns:
          - "*"
    commit-message:
      prefix: "test"

  - package-ecosystem: "npm"
    directories:
      - "test-resources/node.js/express"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:30"
      timezone: "Europe/Berlin"
    groups:
      all:
        patterns:
          - "*"
    commit-message:
      prefix: "test"
