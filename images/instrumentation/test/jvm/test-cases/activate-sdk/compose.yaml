services:
  jvm:
    image: instrumentation-image-test-arm64-jvm-openjdk-24-jdk-bookworm
    command: ["java", "-jar", "/test-cases/activate-sdk/app.jar"]
    environment:
      DASH0_NAMESPACE_NAME: namespace
      DASH0_POD_UID: pod_uid
      DASH0_POD_NAME: pod_name
      DASH0_CONTAINER_NAME: container_name
      DASH0_SERVICE_NAME: XXX_TEST_SERVICE_XXX
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    depends_on:
      - otel-collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.136.0
    volumes:
      - ../../../../../../test-resources/otlp-sink/config.yaml:/etc/otelcol-contrib/config.yaml
      - ../../../../../../test-resources/e2e/volumes/otlp-sink:/telemetry
    ports:
      - 13133:13133
      - 4317:4317
      - 4318:4318
