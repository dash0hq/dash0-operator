apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-maker-mock
  labels:
    app: decision-maker-mock-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: decision-maker-mock-app
  template:
    metadata:
      labels:
        app: decision-maker-mock-app
        app.kubernetes.io/name: "decision-maker-mock"
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/part-of: "dash0-operator-test"
        app.kubernetes.io/instance: "decision-maker-mock"
    spec:
      containers:
        - name: decision-maker-mock-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: grpc
              containerPort: {{ .Values.grpcPort }}
            - name: debug
              containerPort: {{ .Values.debugPort }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.debugPort }}
            initialDelaySeconds: 1
            periodSeconds: 1
