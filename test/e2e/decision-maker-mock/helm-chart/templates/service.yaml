apiVersion: v1
kind: Service
metadata:
  name: decision-maker-mock-service
spec:
  selector:
    app: decision-maker-mock-app
  ports:
    - name: grpc
      port: {{ .Values.grpcPort }}
      targetPort: {{ .Values.grpcPort }}
    - name: debug
      port: {{ .Values.debugPort }}
      targetPort: {{ .Values.debugPort }}
  type: ClusterIP
